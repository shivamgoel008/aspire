# Let's Encrypt ClusterIssuers using the HTTP-01 challenge.
#
# The Aspire AppHost emits an HTTPS listener on storefront-gw and Aspire's
# tls-fqdn-discovery pipeline step patches it with the AGC-assigned FQDN
# (e.g. <random>.fz<n>.alb.azure.com) after deploy. cert-manager then issues
# the certificate against that FQDN using the HTTP-01 challenge through a
# transient HTTPRoute attached to the same gateway.
#
# Replace REPLACE_ME@example.com with a real contact email before applying.
# Start with the staging issuer (referenced by the AppHost by default); once
# everything works, flip the AppHost annotation to `letsencrypt-prod` so the
# next deploy issues a trusted cert.
#
# Apply:
#   kubectl apply -f cluster-issuer.yaml
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: midenn@microsoft.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: storefront-gw
                namespace: default
                kind: Gateway
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: midenn@microsofts.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: storefront-gw
                namespace: default
                kind: Gateway
