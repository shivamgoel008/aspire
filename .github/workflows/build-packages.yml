name: Build Packages (Reusable)

on:
  workflow_call:
    inputs:
      versionOverrideArg:
        required: false
        type: string

env:
  # Arcade sets NuGet's enhanced retry defaults to 6 tries with a 1s base delay in CI; these
  # restore-heavy jobs need more room to retry individual package downloads without rerunning.
  NUGET_ENHANCED_MAX_NETWORK_TRY_COUNT: 10
  NUGET_ENHANCED_NETWORK_RETRY_DELAY_MILLISECONDS: 2000

jobs:
  build_packages:
    name: Build packages
    runs-on: 8-core-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build with packages
        run: ./build.sh -restore -build -ci -pack -bl -p:InstallBrowsersForPlaywright=false -p:SkipTestProjects=true -p:SkipPlaygroundProjects=true -p:SkipBundleDeps=true ${{ inputs.versionOverrideArg }}

      - name: Clean up artifacts
        run: |
          rm -rf artifacts/bin
          rm -rf artifacts/obj

      - name: Upload built NuGets
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: built-nugets
          path: artifacts/packages
          if-no-files-found: error
          retention-days: 15

      # Always upload logs, even if the build fails, to enable debugging
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build_packages_logs
          path: artifacts/log
          retention-days: 5
